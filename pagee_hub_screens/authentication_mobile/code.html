            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center">
<!-- Top Navigation Shell Suppressed for Transactional Flow -->
<main class="w-full max-w-md px-6 py-12 flex flex-col gap-10">
<!-- Brand Identity Section -->
<header class="flex flex-col gap-4 text-center">
<div class="mx-auto w-16 h-16 bg-primary-container flex items-center justify-center rounded-xl shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="hub">hub</span>
</div>
<div class="flex flex-col gap-1">
<h1 class="text-4xl font-black tracking-tighter text-on-surface">Pagee Hub</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Curation for the New Era.</p>
</div>
</header>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(0,0,0,0.04)] flex flex-col gap-8">
<!-- Auth Toggle Tabs -->
<div class="flex p-1 bg-surface-container-low rounded-xl">
<button class="flex-1 py-3 text-sm font-bold tracking-widest uppercase rounded-lg bg-surface-container-lowest text-on-surface shadow-sm">
                    Login
                </button>
<button class="flex-1 py-3 text-sm font-bold tracking-widest uppercase rounded-lg text-on-surface-variant hover:text-on-surface transition-colors">
                    Sign Up
                </button>
</div>
<!-- Form Container -->
<form class="flex flex-col gap-6" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant px-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary-container transition-all text-on-surface placeholder:text-outline-variant" placeholder="hello@curator.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant">Password</label>
<a class="text-[10px] uppercase tracking-[0.1em] font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary-container transition-all text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full py-5 bg-primary-container text-on-primary-container font-black tracking-tight text-lg rounded-xl shadow-[0_10px_20px_-5px_rgba(34,197,94,0.4)] active:scale-[0.98] transition-transform hover:opacity-90">
                    Enter Dashboard
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="flex-1 h-[1px] bg-outline-variant/30"></div>
<span class="text-[10px] uppercase tracking-widest font-bold text-outline-variant">Or continue with</span>
<div class="flex-1 h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center py-4 bg-surface-container-low rounded-xl hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<img alt="Google" class="w-6 h-6 object-contain" data-alt="clean minimal google g logo colorful on white background vector style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsQkJMt4-DTyeTgAYndEgvht3C4sFKySjHhalEeQXedMFE6QrM5b3LjHgtpHm6BCy1x3Vbso4KCnPy4DbC44tD4AWRMtEJFv8gnYwnZ20Y-Wd8N26X5l6tHtrQ9Lk2QaojmL3OhJeH0RDZ8dT9AbrWCVMp0mrBjH8-FS71bBY82myvH7vqFZYRp4pk109Th7XvWIJjz09inKSekUbwf1MIXjxxtQ1afsUmMF0FS7aFQHHbalKEdhK34zmuRidhHYAW-nJS-mHh8W4"/>
</button>
<button class="flex-1 flex items-center justify-center py-4 bg-surface-container-low rounded-xl hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-600 text-2xl" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
</button>
</div>
</div>
<!-- Footer Help -->
<footer class="text-center">
<p class="text-on-surface-variant text-sm font-medium">
                New to the hub? <a class="text-primary font-bold decoration-2 underline-offset-4 hover:underline" href="#">Get started today</a>
</p>
</footer>
</main>
<!-- Visual Accent Element (Asymmetry) -->
<div class="fixed -top-24 -right-24 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed -bottom-24 -left-24 w-80 h-80 bg-tertiary-container/10 rounded-full blur-3xl -z-10"></div>
<!-- Bottom Nav Suppressed (Transactional/Linear Flow) -->
</body></html>
